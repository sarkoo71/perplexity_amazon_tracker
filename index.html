<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Order Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {margin: 0;padding: 0;box-sizing: border-box;font-family: 'Segoe UI', sans-serif;}
body {background: #0f0f1a;color: #e0e0e0;min-height: 100vh;}
#app {min-height: 100vh;}
.login-screen {display: flex;align-items: center;justify-content: center;min-height: 100vh;background: linear-gradient(135deg, #0f0f1a, #1a1a2e);}
.login-box {background: #1e1e2e;border: 1px solid #2a2a4a;border-radius: 16px;padding: 40px;width: 380px;box-shadow: 0 20px 60px rgba(0,0,0,0.5);}
.login-box h1 {font-size: 24px;margin-bottom: 4px;color: #fff;}
.login-box p {color: #888;font-size: 13px;margin-bottom: 28px;}
.login-logo {font-size: 36px;margin-bottom: 16px;}
.form-group {margin-bottom: 16px;}
.form-group label {display: block;font-size: 12px;color: #aaa;margin-bottom: 6px;text-transform: uppercase;letter-spacing: 1px;}
.form-group input {width: 100%;padding: 10px 14px;background: #2a2a3e;border: 1px solid #3a3a5a;border-radius: 8px;color: #fff;font-size: 14px;outline: none;transition: border .2s;}
.form-group input:focus {border-color: #6c63ff;}
.btn {width: 100%;padding: 12px;background: linear-gradient(135deg, #6c63ff, #4ecdc4);border: none;border-radius: 8px;color: #fff;font-size: 15px;font-weight: 600;cursor: pointer;transition: opacity .2s;}
.btn:hover {opacity: .9;}
.login-error {color: #ff6b6b;font-size: 13px;margin-top: 10px;display: none;}
.main-layout {display: flex;min-height: 100vh;}
.sidebar {width: 220px;background: #1a1a2e;border-right: 1px solid #2a2a4a;display: flex;flex-direction: column;padding: 20px 0;flex-shrink: 0;}
.sidebar-logo {padding: 0 20px 24px;font-size: 18px;font-weight: 700;color: #fff;border-bottom: 1px solid #2a2a4a;margin-bottom: 16px;}
.sidebar-logo span {color: #6c63ff;}
.sidebar-nav a {display: flex;align-items: center;gap: 10px;padding: 10px 20px;color: #aaa;text-decoration: none;font-size: 14px;transition: all .2s;cursor: pointer;}
.sidebar-nav a:hover, .sidebar-nav a.active {background: #2a2a4a;color: #fff;border-left: 3px solid #6c63ff;}
.sidebar-nav a .icon {font-size: 18px;}
.sidebar-bottom {margin-top: auto;padding: 20px;}
.sidebar-user {font-size: 12px;color: #888;display: flex;align-items: center;gap: 8px;}
.sidebar-user .avatar {width: 32px;height: 32px;border-radius: 50%;background: linear-gradient(135deg, #6c63ff, #4ecdc4);display: flex;align-items: center;justify-content: center;font-weight: 700;font-size: 13px;color: #fff;}
.main-content {flex: 1;overflow-y: auto;background: #0f0f1a;}
.topbar {background: #1a1a2e;border-bottom: 1px solid #2a2a4a;padding: 16px 28px;display: flex;align-items: center;justify-content: space-between;}
.topbar h2 {font-size: 20px;font-weight: 700;color: #fff;}
.topbar-actions {display: flex;gap: 10px;}
.btn-sm {padding: 8px 16px;border: none;border-radius: 8px;font-size: 13px;font-weight: 600;cursor: pointer;transition: all .2s;}
.btn-primary {background: linear-gradient(135deg, #6c63ff, #4ecdc4);color: #fff;}
.btn-outline {background: transparent;border: 1px solid #3a3a5a;color: #ccc;}
.btn-outline:hover {border-color: #6c63ff;color: #6c63ff;}
.btn-danger {background: #ff4757;color: #fff;}
.btn-success {background: #2ed573;color: #000;}
.btn-warn {background: #ffa502;color: #000;}
.page {padding: 28px;display: none;}
.page.active {display: block;}
.kpi-grid {display: grid;grid-template-columns: repeat(4, 1fr);gap: 16px;margin-bottom: 28px;}
.kpi-card {background: #1e1e2e;border: 1px solid #2a2a4a;border-radius: 12px;padding: 20px;}
.kpi-card .label {font-size: 12px;color: #888;text-transform: uppercase;letter-spacing: 1px;margin-bottom: 8px;}
.kpi-card .value {font-size: 28px;font-weight: 700;color: #fff;}
.kpi-card .sub {font-size: 12px;color: #aaa;margin-top: 4px;}
.kpi-card.urgent .value {color: #ff6b6b;}
.kpi-card.success .value {color: #2ed573;}
.kpi-card.warn .value {color: #ffa502;}
.kpi-card.primary .value {color: #6c63ff;}
.alerts-banner {margin-bottom: 24px;}
.alert-item {background: #2a1a1a;border: 1px solid #ff4757;border-radius: 10px;padding: 14px 18px;display: flex;align-items: center;justify-content: space-between;margin-bottom: 8px;}
.alert-item.warn {background: #2a2200;border-color: #ffa502;}
.alert-item .alert-text {font-size: 13px;color: #fff;}
.alert-item .alert-text strong {color: #ff6b6b;}
.alert-item.warn .alert-text strong {color: #ffa502;}
.alert-actions {display: flex;gap: 8px;}
.charts-grid {display: grid;grid-template-columns: 1fr 1fr;gap: 20px;margin-bottom: 28px;}
.chart-card {background: #1e1e2e;border: 1px solid #2a2a4a;border-radius: 12px;padding: 20px;}
.chart-card h3 {font-size: 14px;color: #aaa;margin-bottom: 16px;text-transform: uppercase;letter-spacing: 1px;}
.section-header {display: flex;align-items: center;justify-content: space-between;margin-bottom: 16px;}
.section-header h3 {font-size: 16px;font-weight: 700;color: #fff;}
.table-wrap {background: #1e1e2e;border: 1px solid #2a2a4a;border-radius: 12px;overflow: hidden;}
table {width: 100%;border-collapse: collapse;}
thead th {background: #2a2a3e;padding: 12px 16px;text-align: left;font-size: 12px;color: #888;text-transform: uppercase;letter-spacing: 1px;}
tbody tr {border-bottom: 1px solid #2a2a4a;transition: background .15s;}
tbody tr:hover {background: #252535;}
tbody tr:last-child {border-bottom: none;}
td {padding: 12px 16px;font-size: 13px;color: #ddd;}
.badge {padding: 4px 10px;border-radius: 20px;font-size: 11px;font-weight: 600;display: inline-block;}
.badge-green {background: #1a3a2a;color: #2ed573;border: 1px solid #2ed573;}
.badge-red {background: #3a1a1a;color: #ff6b6b;border: 1px solid #ff6b6b;}
.badge-orange {background: #3a2a00;color: #ffa502;border: 1px solid #ffa502;}
.badge-blue {background: #1a1a3a;color: #6c63ff;border: 1px solid #6c63ff;}
.badge-gray {background: #2a2a2a;color: #888;border: 1px solid #444;}
.modal-overlay {display: none;position: fixed;inset: 0;background: rgba(0,0,0,.7);z-index: 1000;align-items: center;justify-content: center;}
.modal-overlay.open {display: flex;}
.modal {background: #1e1e2e;border: 1px solid #2a2a4a;border-radius: 16px;padding: 32px;width: 560px;max-width: 95vw;max-height: 90vh;overflow-y: auto;position: relative;}
.modal h2 {font-size: 20px;font-weight: 700;margin-bottom: 6px;color: #fff;}
.modal .subtitle {color: #888;font-size: 13px;margin-bottom: 24px;}
.modal-close {position: absolute;top: 16px;right: 16px;background: none;border: none;color: #888;font-size: 22px;cursor: pointer;}
.modal-close:hover {color: #fff;}
.field-row {display: grid;grid-template-columns: 1fr 1fr;gap: 14px;margin-bottom: 14px;}
.field-row.full {grid-template-columns: 1fr;}
.field-group label {display: block;font-size: 11px;color: #888;margin-bottom: 5px;text-transform: uppercase;letter-spacing: 1px;}
.field-group input, .field-group select {width: 100%;padding: 9px 12px;background: #2a2a3e;border: 1px solid #3a3a5a;border-radius: 7px;color: #fff;font-size: 13px;outline: none;}
.field-group input:focus, .field-group select:focus {border-color: #6c63ff;}
.modal-footer {display: flex;gap: 10px;justify-content: flex-end;margin-top: 24px;padding-top: 16px;border-top: 1px solid #2a2a4a;}
.import-box {background: #1e1e2e;border: 2px dashed #3a3a5a;border-radius: 12px;padding: 40px;text-align: center;margin-bottom: 24px;transition: border .2s;}
.import-box:hover {border-color: #6c63ff;}
.import-box .icon {font-size: 48px;margin-bottom: 12px;}
.import-box p {color: #888;font-size: 14px;}
.import-box input[type=file] {display: none;}
.import-box label {display: inline-block;margin-top: 14px;padding: 10px 22px;background: #6c63ff;border-radius: 8px;color: #fff;font-size: 13px;cursor: pointer;font-weight: 600;}
.import-instructions {background: #1e1e2e;border: 1px solid #2a2a4a;border-radius: 12px;padding: 24px;}
.import-instructions h3 {font-size: 15px;color: #fff;margin-bottom: 12px;}
.import-instructions ol {padding-left: 20px;color: #aaa;font-size: 13px;line-height: 2;}
.import-instructions code {background: #2a2a3e;padding: 2px 6px;border-radius: 4px;color: #4ecdc4;font-size: 12px;}
.settings-section {background: #1e1e2e;border: 1px solid #2a2a4a;border-radius: 12px;padding: 24px;margin-bottom: 20px;}
.settings-section h3 {font-size: 15px;color: #fff;margin-bottom: 16px;padding-bottom: 10px;border-bottom: 1px solid #2a2a4a;}
.setting-row {display: flex;align-items: center;justify-content: space-between;padding: 10px 0;border-bottom: 1px solid #1a1a2e;}
.setting-row:last-child {border-bottom: none;}
.setting-info .name {font-size: 14px;color: #ddd;}
.setting-info .desc {font-size: 12px;color: #888;margin-top: 2px;}
.toggle {position: relative;width: 44px;height: 24px;}
.toggle input {opacity: 0;width: 0;height: 0;}
.toggle-slider {position: absolute;inset: 0;background: #3a3a5a;border-radius: 12px;cursor: pointer;transition: .3s;}
.toggle-slider:before {content: '';position: absolute;width: 18px;height: 18px;left: 3px;top: 3px;background: #888;border-radius: 50%;transition: .3s;}
.toggle input:checked + .toggle-slider {background: #6c63ff;}
.toggle input:checked + .toggle-slider:before {transform: translateX(20px);background: #fff;}
.empty-state {text-align: center;padding: 60px 20px;color: #555;}
.empty-state .icon {font-size: 56px;margin-bottom: 16px;}
.empty-state p {font-size: 15px;}
.empty-state small {font-size: 13px;color: #444;margin-top: 6px;display: block;}
</style>
</head>
<body>
<div id="app"></div>
<script>
const STATE = {currentUser: null, orders: [], users: [], currentPage: 'dashboard', charts: {}, settings: {emailAlerts: true, pushAlerts: true, alertThreshold: 5}};
const storage = {
get(key) {try {const d = localStorage.getItem(key); return d ? JSON.parse(d) : null;} catch(e) {return null;}},
set(key, val) {try {localStorage.setItem(key, JSON.stringify(val));} catch(e) {}},
clear() {try {localStorage.clear();} catch(e) {}}
};
function login(username, password) {
const users = storage.get('users') || [];
const user = users.find(u => u.username === username && u.password === password);
if (user) {STATE.currentUser = user; storage.set('currentUser', user); return true;}
return false;
}
function logout() {STATE.currentUser = null; storage.set('currentUser', null); renderApp();}
function createAccount(username, password, name) {
const users = storage.get('users') || [];
if (users.find(u => u.username === username)) return false;
const user = {id: Date.now(), username, password, name, createdAt: new Date().toISOString()};
users.push(user);
storage.set('users', users);
return true;
}
function addOrder(order) {order.id = Date.now(); order.createdAt = new Date().toISOString(); STATE.orders.push(order); saveOrders(); return order;}
function updateOrder(id, updates) {
const idx = STATE.orders.findIndex(o => o.id === id);
if (idx > -1) {STATE.orders[idx] = {...STATE.orders[idx], ...updates}; saveOrders(); return STATE.orders[idx];}
return null;
}
function deleteOrder(id) {STATE.orders = STATE.orders.filter(o => o.id !== id); saveOrders();}
function saveOrders() {storage.set('orders_' + STATE.currentUser.id, STATE.orders);}
function loadOrders() {STATE.orders = storage.get('orders_' + STATE.currentUser.id) || [];}
function checkAlerts() {
const alerts = [];
const now = new Date();
STATE.orders.forEach(order => {
if (!order.returnDeadline) return;
const deadline = new Date(order.returnDeadline);
const daysLeft = Math.ceil((deadline - now) / (1000 * 60 * 60 * 24));
if (daysLeft <= STATE.settings.alertThreshold && daysLeft >= 0) {
if (!order.refundReceived) {
alerts.push({type: 'refund', order, daysLeft, message: `Return window closing in ${daysLeft} days for ${order.productName}. Did you get your refund?`});
}
if (!order.commissionReceived && order.commission > 0) {
alerts.push({type: 'commission', order, daysLeft, message: `${daysLeft} days left to claim commission on ${order.productName}`});
}
}
});
return alerts;
}
function parseCSVLine(line){const r=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch=='"'){if(q&&line[i+1]=='"'){c+='"';i++;}else{q=!q;}}else if(ch==','&&!q){r.push(c.trim());c='';}else{c+=ch;}}r.push(c.trim());return r;} function normDate(s){if(!s)return '';if(/^\d{4}-\d{2}-\d{2}/.test(s))return s;const d=new Date(s);return isNaN(d)?'':d.toISOString().split('T')[0];} function importCSV(csvText) {
const lines = csvText.trim().split('\n');
const headers = lines[0].split(',');
for (let i = 1; i < lines.length; i++) {
const vals = parseCSVLine(lines[i]);
if (vals.length < 3) continue; if (!vals[0] || vals[0].startsWith('=') || vals[1].startsWith('=')) continue;
const order = {
productName: vals[IDX.name]||'Unknown',
orderDate: normDate(vals[IDX.odate]) || new Date().toISOString().split('T')[0],
returnDeadline: normDate(vals[IDX.rdate]) || null,
priceWithoutTax: parseFloat(vals[IDX.pnt]) || 0,
priceWithTax: parseFloat(vals[IDX.pt]) || 0,
commission: parseFloat(vals[IDX.comm]) || 0,
refund: parseFloat(vals[IDX.ref]) || 0,
refundReceived: vals[IDX.refR] === 'true',
commissionReceived: vals[IDX.commR] === 'true',
status: vals[IDX.stat] || 'delivered',
imageUrl: vals[IDX.img] || ''
};
addOrder(order);
}
renderApp();
return {success: true, count: lines.length - 1, message: 'Orders imported successfully'};
}
function exportCSV() {
const headers = 'Product Name,Order Date,Return Deadline,Price (No Tax),Price (With Tax),Commission,Refund,Refund Received,Commission Received,Status,Image URL';
const rows = STATE.orders.map(o => [o.productName,o.orderDate,o.returnDeadline||'',o.priceWithoutTax,o.priceWithTax,o.commission,o.refund,o.refundReceived,o.commissionReceived,o.status,o.imageUrl||''].map(f=>'"'+String(f).replace(/"/g,'""')+'"').join(','));
const csv = headers + '\n' + rows.join('\n');
const blob = new Blob([csv], {type: 'text/csv'});
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = 'amazon_orders_' + new Date().toISOString().split('T')[0] + '.csv';
a.click();
}
function destroyCharts() {
if (STATE.charts.deadlines) {STATE.charts.deadlines.destroy(); STATE.charts.deadlines = null;}
if (STATE.charts.revenue) {STATE.charts.revenue.destroy(); STATE.charts.revenue = null;}
}
function createCharts() {
destroyCharts();
setTimeout(() => {
const ctx1 = document.getElementById('chartDeadlines');
const ctx2 = document.getElementById('chartRevenue');
if (ctx1 && Chart) {
const deadlineData = STATE.orders.filter(o => o.returnDeadline).map(o => ({x: o.returnDeadline.split('T')[0], y: o.priceWithTax}));
STATE.charts.deadlines = new Chart(ctx1, {
type: 'bar',
data: {labels: deadlineData.map(d => d.x), datasets: [{label: 'Return Deadlines', data: deadlineData.map(d => d.y), backgroundColor: 'rgba(108,99,255,0.6)'}]},
options: {scales: {y: {beginAtZero: true}}, plugins: {legend: {display: false}}}
});
}
if (ctx2 && Chart) {
const revenueByMonth = {};
STATE.orders.forEach(o => {
const month = o.orderDate ? o.orderDate.substring(0, 7) : 'Unknown';
revenueByMonth[month] = (revenueByMonth[month] || 0) + o.priceWithTax;
});
const labels = Object.keys(revenueByMonth).sort();
const data = labels.map(l => revenueByMonth[l]);
STATE.charts.revenue = new Chart(ctx2, {
type: 'bar',
data: {labels, datasets: [{label: 'Revenue', data, backgroundColor: 'rgba(78,205,196,0.6)'}]},
options: {scales: {y: {beginAtZero: true}}, plugins: {legend: {display: false}}}
});
}
}, 100);
}
function renderLogin() {
return `<div class="login-screen"><div class="login-box"><div class="login-logo">📦</div><h1>Amazon Order Tracker</h1><p>Track returns, refunds & commissions</p><div class="form-group"><label>Username</label><input type="text" id="loginUser" placeholder="Enter username"></div><div class="form-group"><label>Password</label><input type="password" id="loginPass" placeholder="Enter password"></div><button class="btn" onclick="handleLogin()">Sign In</button><div class="login-error" id="loginError">Invalid credentials</div></div></div>`;
}
function renderDashboard() {
const alerts = checkAlerts();
const total = STATE.orders.length;
const urgent = STATE.orders.filter(o => {if (!o.returnDeadline) return false; const days = Math.ceil((new Date(o.returnDeadline) - new Date()) / (1000 * 60 * 60 * 24)); return days <= 5 && days >= 0;}).length;
const totalRevenue = STATE.orders.reduce((sum, o) => sum + o.priceWithTax, 0);
const pendingRefunds = STATE.orders.filter(o => !o.refundReceived && o.refund > 0).length;
return `<div class="page active"><div class="topbar"><h2>Dashboard</h2><div class="topbar-actions"><button class="btn-sm btn-primary" onclick="showAddOrderModal()">+ Add Order</button><button class="btn-sm btn-outline" onclick="exportCSV()">Export CSV</button></div></div><div style="padding:28px">${alerts.length > 0 ? `<div class="alerts-banner">${alerts.map(a => `<div class="alert-item ${a.type === 'commission' ? 'warn' : ''}"><div class="alert-text"><strong>${a.daysLeft}d left:</strong> ${a.message}</div><div class="alert-actions"><button class="btn-sm btn-success" onclick="markReceived(${a.order.id},'${a.type}')">Got it</button><button class="btn-sm btn-outline" onclick="dismissAlert(${a.order.id})">Dismiss</button></div></div>`).join('')}</div>` : ''}<div class="kpi-grid"><div class="kpi-card primary"><div class="label">Total Orders</div><div class="value">${total}</div><div class="sub">Last 30 days</div></div><div class="kpi-card urgent"><div class="label">Urgent Items</div><div class="value">${urgent}</div><div class="sub">≤5 days left</div></div><div class="kpi-card success"><div class="label">Total Revenue</div><div class="value">$${totalRevenue.toFixed(2)}</div><div class="sub">All orders</div></div><div class="kpi-card warn"><div class="label">Pending Refunds</div><div class="value">${pendingRefunds}</div><div class="sub">Awaiting money</div></div></div><div class="charts-grid"><div class="chart-card"><h3>Return Deadlines</h3><canvas id="chartDeadlines" height="200"></canvas></div><div class="chart-card"><h3>Revenue by Month</h3><canvas id="chartRevenue" height="200"></canvas></div></div><div class="section-header"><h3>All Orders</h3></div><div class="table-wrap"><table><thead><tr><th>Product</th><th>Order Date</th><th>Return Deadline</th><th>Price</th><th>Refund</th><th>Commission</th><th>Status</th><th>Actions</th></tr></thead><tbody>${STATE.orders.length > 0 ? STATE.orders.map(o => `<tr><td>${o.productName}</td><td>${o.orderDate ? new Date(o.orderDate).toLocaleDateString() : 'N/A'}</td><td>${o.returnDeadline ? new Date(o.returnDeadline).toLocaleDateString() : 'N/A'}</td><td>$${o.priceWithTax.toFixed(2)}</td><td><span class="badge ${o.refundReceived ? 'badge-green' : 'badge-red'}">${o.refundReceived ? '✓ Received' : 'Pending'}</span></td><td><span class="badge ${o.commissionReceived ? 'badge-green' : 'badge-orange'}">${o.commission > 0 ? '$' + o.commission.toFixed(2) : 'N/A'}</span></td><td><span class="badge badge-blue">${o.status || 'delivered'}</span></td><td><button class="btn-sm btn-outline" onclick="editOrder(${o.id})">Edit</button></td></tr>`).join('') : '<tr><td colspan="8"><div class="empty-state"><div class="icon">📦</div><p>No orders yet</p><small>Import CSV or add manually</small></div></td></tr>'}</tbody></table></div></div></div>`;
}
function renderImport() {
return `<div class="page active"><div class="topbar"><h2>Import Orders</h2><p>Upload your Amazon Order History CSV file</p></div><div style="padding: 40px; text-align: center;"><input type="file" id="csvFileInput" accept=".csv" style="display:none" onchange="handleCSVFile(this)"/><button class="btn-sm btn-primary" id="csvChooseBtn">📁 Choose CSV File</button><div id="importStatus" style="margin-top: 20px; color: #aaa;"></div></div></div>`;
}
function renderOrders() {
return `<div class="page active"><div class="topbar"><h2>All Orders</h2></div><div style="padding: 28px;"><div class="table-wrap"><table><thead><tr><th>Product</th><th>Order Date</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead><tbody>${STATE.orders.length > 0 ? STATE.orders.map(o => `<tr><td>${o.productName}</td><td>${o.orderDate ? new Date(o.orderDate).toLocaleDateString() : 'N/A'}</td><td>$${o.priceWithTax.toFixed(2)}</td><td><span class="badge badge-blue">${o.status || 'delivered'}</span></td><td><button class="btn-sm btn-outline" onclick="editOrder(${o.id})">Edit</button> <button class="btn-sm btn-danger" onclick="deleteOrder(${o.id}); renderApp();">Delete</button></td></tr>`).join('') : '<tr><td colspan="5"><div class="empty-state"><div class="icon">📦</div><p>No orders yet</p></div></td></tr>'}</tbody></table></div></div></div>`;
}
function renderSettings() {
return `<div class="page active"><div class="topbar"><h2>Settings</h2></div><div style="padding: 28px;"><div class="settings-section"><h3>Notifications</h3><div class="setting-row"><div class="setting-info"><div class="name">Email Alerts</div><div class="desc">Receive email notifications for urgent items</div></div><label class="toggle"><input type="checkbox" ${STATE.settings.emailAlerts ? 'checked' : ''} onchange="STATE.settings.emailAlerts = this.checked; storage.set('settings', STATE.settings);"><span class="toggle-slider"></span></label></div><div class="setting-row"><div class="setting-info"><div class="name">Push Notifications</div><div class="desc">Browser push notifications</div></div><label class="toggle"><input type="checkbox" ${STATE.settings.pushAlerts ? 'checked' : ''} onchange="STATE.settings.pushAlerts = this.checked; storage.set('settings', STATE.settings);"><span class="toggle-slider"></span></label></div></div><div class="settings-section"><h3>Alert Threshold</h3><div class="setting-row"><div class="setting-info"><div class="name">Days Before Deadline</div><div class="desc">Show alerts when ${STATE.settings.alertThreshold} days or less remain</div></div><input type="number" min="1" max="30" value="${STATE.settings.alertThreshold}" onchange="STATE.settings.alertThreshold = parseInt(this.value); storage.set('settings', STATE.settings); renderApp();" style="width: 80px; padding: 6px; background: #2a2a3e; border: 1px solid #3a3a5a; border-radius: 6px; color: #fff;"></div></div><div class="settings-section"><h3>Account</h3><div class="setting-row"><div class="setting-info"><div class="name">Clear All Orders</div><div class="desc">Delete all imported orders from this account</div></div><button class="btn-sm btn-danger" onclick="STATE.orders=[];saveOrders();renderApp();">Clear Orders</button></div><div class="setting-row"><div class="setting-info"><div class="name">Logout</div><div class="desc">Sign out of your account</div></div><button class="btn-sm btn-danger" onclick="logout()">Logout</button></div></div></div></div>`;
}
function renderMainLayout() {
return `<div class="main-layout"><div class="sidebar"><div class="sidebar-logo">Amazon<span>Tracker</span></div><div class="sidebar-nav"><a class="${STATE.currentPage === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')"><span class="icon">📊</span> Dashboard</a><a class="${STATE.currentPage === 'orders' ? 'active' : ''}" onclick="navigate('orders')"><span class="icon">📦</span> Orders</a><a class="${STATE.currentPage === 'import' ? 'active' : ''}" onclick="navigate('import')"><span class="icon">📁</span> Import</a><a class="${STATE.currentPage === 'settings' ? 'active' : ''}" onclick="navigate('settings')"><span class="icon">⚙️</span> Settings</a></div><div class="sidebar-bottom"><div class="sidebar-user"><div class="avatar">${STATE.currentUser.name ? STATE.currentUser.name[0].toUpperCase() : 'U'}</div><div><div style="font-weight:600;color:#ddd">${STATE.currentUser.name || STATE.currentUser.username}</div><div>${STATE.currentUser.username}</div></div></div></div></div><div class="main-content">${STATE.currentPage === 'dashboard' ? renderDashboard() : STATE.currentPage === 'import' ? renderImport() : STATE.currentPage === 'orders' ? renderOrders() : STATE.currentPage === 'settings' ? renderSettings() : ''}</div></div>`;
}
function renderApp() {
const app = document.getElementById('app');
if (!STATE.currentUser) {
app.innerHTML = renderLogin();
} else {
loadOrders();
app.innerHTML = renderMainLayout();
if (STATE.currentPage === 'dashboard') {
createCharts();
}
if (STATE.currentPage === 'import') {
setupFileInputListener();
}
}
}
function handleLogin() {
const user = document.getElementById('loginUser').value;
const pass = document.getElementById('loginPass').value;
if (login(user, pass)) {
renderApp();
} else {
document.getElementById('loginError').style.display = 'block';
}
}
function navigate(page) {
STATE.currentPage = page;
renderApp();
}
function showAddOrderModal() {
const overlay = document.createElement('div');
overlay.className = 'modal-overlay open';
overlay.innerHTML = `<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button><h2>Add New Order</h2><p class="subtitle">Enter order details</p><div class="field-row full"><div class="field-group"><label>Product Name</label><input type="text" id="newProductName"></div></div><div class="field-row"><div class="field-group"><label>Order Date</label><input type="date" id="newOrderDate" value="${new Date().toISOString().split('T')[0]}"></div><div class="field-group"><label>Return Deadline</label><input type="date" id="newReturnDeadline"></div></div><div class="field-row"><div class="field-group"><label>Price (No Tax)</label><input type="number" step="0.01" id="newPriceNoTax"></div><div class="field-group"><label>Price (With Tax)</label><input type="number" step="0.01" id="newPriceTax"></div></div><div class="field-row"><div class="field-group"><label>Commission</label><input type="number" step="0.01" id="newCommission" value="0"></div><div class="field-group"><label>Refund Amount</label><input type="number" step="0.01" id="newRefund" value="0"></div></div><div class="field-row full"><div class="field-group"><label>Image URL (Optional)</label><input type="text" id="newImageUrl"></div></div><div class="modal-footer"><button class="btn-sm btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-sm btn-primary" onclick="saveNewOrder()">Add Order</button></div></div>`;
document.body.appendChild(overlay);
}
function saveNewOrder() {
const order = {
productName: document.getElementById('newProductName').value,
orderDate: document.getElementById('newOrderDate').value,
returnDeadline: document.getElementById('newReturnDeadline').value,
priceWithoutTax: parseFloat(document.getElementById('newPriceNoTax').value) || 0,
priceWithTax: parseFloat(document.getElementById('newPriceTax').value) || 0,
commission: parseFloat(document.getElementById('newCommission').value) || 0,
refund: parseFloat(document.getElementById('newRefund').value) || 0,
imageUrl: document.getElementById('newImageUrl').value,
refundReceived: false,
commissionReceived: false,
status: 'delivered'
};
addOrder(order);
document.querySelector('.modal-overlay').remove();
renderApp();
}
function editOrder(id) {
const order = STATE.orders.find(o => o.id === id);
if (!order) return;
const overlay = document.createElement('div');
overlay.className = 'modal-overlay open';
overlay.innerHTML = `<div class="modal"><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">×</button><h2>Edit Order</h2><p class="subtitle">Update order details</p><div class="field-row full"><div class="field-group"><label>Product Name</label><input type="text" id="editProductName" value="${order.productName}"></div></div><div class="field-row"><div class="field-group"><label>Order Date</label><input type="date" id="editOrderDate" value="${order.orderDate ? order.orderDate.split('T')[0] : ''}"></div><div class="field-group"><label>Return Deadline</label><input type="date" id="editReturnDeadline" value="${order.returnDeadline ? order.returnDeadline.split('T')[0] : ''}"></div></div><div class="field-row"><div class="field-group"><label>Price (With Tax)</label><input type="number" step="0.01" id="editPriceTax" value="${order.priceWithTax}"></div><div class="field-group"><label>Commission</label><input type="number" step="0.01" id="editCommission" value="${order.commission}"></div></div><div class="field-row"><div class="field-group"><label>Refund Received</label><select id="editRefundRec"><option value="false" ${!order.refundReceived ? 'selected' : ''}>No</option><option value="true" ${order.refundReceived ? 'selected' : ''}>Yes</option></select></div><div class="field-group"><label>Commission Received</label><select id="editCommRec"><option value="false" ${!order.commissionReceived ? 'selected' : ''}>No</option><option value="true" ${order.commissionReceived ? 'selected' : ''}>Yes</option></select></div></div><div class="modal-footer"><button class="btn-sm btn-outline" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button class="btn-sm btn-primary" onclick="saveEditOrder(${id})">Save Changes</button></div></div>`;
document.body.appendChild(overlay);
}
function saveEditOrder(id) {
const updates = {
productName: document.getElementById('editProductName').value,
orderDate: document.getElementById('editOrderDate').value,
returnDeadline: document.getElementById('editReturnDeadline').value,
priceWithTax: parseFloat(document.getElementById('editPriceTax').value) || 0,
commission: parseFloat(document.getElementById('editCommission').value) || 0,
refundReceived: document.getElementById('editRefundRec').value === 'true',
commissionReceived: document.getElementById('editCommRec').value === 'true'
};
updateOrder(id, updates);
document.querySelector('.modal-overlay').remove();
renderApp();
}
function markReceived(id, type) {
const updates = {};
if (type === 'refund') updates.refundReceived = true;
if (type === 'commission') updates.commissionReceived = true;
updateOrder(id, updates);
renderApp();
}
function dismissAlert(id) {
renderApp();
}
function handleCSVFile(input) { const file = input.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(e) { const result = importCSV(e.target.result); const statusDiv = document.getElementById('importStatus'); if (statusDiv) { if (result.success) { statusDiv.innerHTML = `<div style="color:#4caf50;font-weight:bold">✓ Imported ${result.count} orders!</div>`; setTimeout(() => navigate('dashboard'), 1500); } else { statusDiv.innerHTML = `<div style="color:#f44336">✗ Error: ${result.message}</div>`; } } }; reader.readAsText(file); } function setupFileInputListener() { const btn = document.getElementById('csvChooseBtn'); const fileInput = document.getElementById('csvFileInput'); if (btn && fileInput) { btn.addEventListener('click', function() { fileInput.click(); }); } if (fileInput) { fileInput.addEventListener('change', function(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = function(ev) { const result = importCSV(ev.target.result); const statusDiv = document.getElementById('importStatus'); if (statusDiv) { if (result.success) { statusDiv.innerHTML = '<div style="color:#4caf50;font-weight:bold">✓ Imported ' + result.count + ' orders!</div>'; setTimeout(function() { navigate('dashboard'); }, 1500); } else { statusDiv.innerHTML = '<div style="color:#f44336">✗ Error: ' + result.message + '</div>'; } } }; reader.readAsText(file); }); } }
const fileInput = document.getElementById('csvFileInput');
if (fileInput) {
fileInput.addEventListener('change', (e) => {
const file = e.target.files[0];
if (file) {
const reader = new FileReader();
reader.onload = (event) => {
const csvText = event.target.result;
const result = importCSV(csvText);
const statusDiv = document.getElementById('importStatus');
if (statusDiv) {
if (result.success) {
statusDiv.innerHTML = `<div style="color: #4caf50; font-weight: bold;">✓ Successfully imported ${result.count} orders!</div>`;
setTimeout(() => navigate('dashboard'), 1500);
} else {
statusDiv.innerHTML = `<div style="color: #f44336;">✗ Error: ${result.message}</div>`;
}
}
};
reader.readAsText(file);
}
});
}
}
function init() {
const savedUser = storage.get('currentUser');
if (savedUser) {STATE.currentUser = savedUser;}
STATE.settings = storage.get('settings') || STATE.settings;
if (!storage.get('users')) {storage.set('users', [{id: 1, username: 'demo', password: 'demo', name: 'Demo User'}]);}
renderApp();
}
Object.assign(window, {handleLogin, navigate, showAddOrderModal, saveNewOrder, editOrder, saveEditOrder, markReceived, dismissAlert, exportCSV, logout, handleCSVFile});
init();
</script>
</body>
</html>
